<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Interval Timer" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
  <title>Interval Timer</title>

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />

  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f5f5f5;
      --bg3: #ebebeb;
      --text: #111111;
      --text2: #666666;
      --text3: #999999;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius: 14px;
      --radius-sm: 9px;
      --green: #1D9E75;
      --red: #E24B4A;
      --amber: #BA7517;
      --blue: #185FA5;
      --info-bg: #e6f1fb;
      --info-text: #0C447C;
      --success-bg: #eaf3de;
      --success-text: #3B6D11;
      --muted-bg: #ebebeb;
      --muted-text: #5F5E5A;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --bg2: #242424;
        --bg3: #2e2e2e;
        --text: #f0f0f0;
        --text2: #aaaaaa;
        --text3: #777777;
        --border: rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.20);
        --info-bg: #042C53;
        --info-text: #85B7EB;
        --success-bg: #173404;
        --success-text: #97C459;
        --muted-bg: #2e2e2e;
        --muted-text: #aaaaaa;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      min-height: 100%;
      background: var(--bg3);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg3);
      padding-bottom: calc(env(safe-area-inset-bottom) + 80px);
    }

    .topbar {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: calc(env(safe-area-inset-top) + 14px) 16px 14px;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-title { font-size: 17px; font-weight: 600; }
    .topbar-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

    .content { padding: 12px 16px; }

    .section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text2); margin: 14px 0 6px;
    }

    /* Cards */
    .card {
      background: var(--bg);
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      overflow: hidden;
      margin-bottom: 8px;
    }
    .preset-row {
      display: flex; align-items: center;
      padding: 12px 14px; gap: 10px; cursor: pointer;
    }
    .preset-row:hover, .preset-row:active { background: var(--bg2); }
    .preset-row + .preset-row { border-top: 0.5px solid var(--border); }
    .preset-icon {
      width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .preset-body { flex: 1; min-width: 0; }
    .preset-name { font-size: 15px; font-weight: 500; }
    .preset-coach { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .preset-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .preset-chevron { color: var(--text3); font-size: 18px; flex-shrink: 0; }

    .badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 20px; margin-bottom: 4px;
    }
    .badge-science { background: var(--success-bg); color: var(--success-text); }
    .badge-coach { background: var(--info-bg); color: var(--info-text); }
    .badge-popular { background: var(--muted-bg); color: var(--muted-text); }
    .badge-custom { background: var(--muted-bg); color: var(--muted-text); }

    .info-panel {
      display: none; padding: 10px 14px;
      border-top: 0.5px solid var(--border);
      background: var(--bg2);
      font-size: 12px; color: var(--text2); line-height: 1.5;
    }
    .info-panel.open { display: flex; align-items: flex-start; gap: 8px; }

    /* Action row below preset */
    .action-row {
      display: none; border-top: 0.5px solid var(--border);
      background: var(--bg2);
    }
    .action-row.open { display: flex; }
    .action-btn {
      flex: 1; padding: 11px 8px; border: none; background: transparent;
      color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .action-btn:hover { background: var(--bg3); color: var(--text); }
    .action-btn + .action-btn { border-left: 0.5px solid var(--border); }
    .action-btn i { font-size: 20px; }
    .action-btn.go { color: var(--green); }
    .action-btn.go:hover { background: var(--success-bg); }

    /* FAB */
    .fab {
      position: fixed; bottom: calc(env(safe-area-inset-bottom) + 76px); right: 20px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--text); color: var(--bg);
      border: none; cursor: pointer; font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25); z-index: 20;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--bg);
      border-top: 0.5px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 10;
    }
    .nav-btn {
      flex: 1; padding: 10px 4px 6px; border: none; background: transparent;
      cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px;
      color: var(--text2); font-size: 10px; font-weight: 500;
    }
    .nav-btn.active { color: var(--text); }
    .nav-btn i { font-size: 22px; }

    /* Screens */
    .screen { display: none; }
    .screen.active { display: block; }

    /* Timer screen */
    .timer-wrapper {
      min-height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 60px);
      display: flex; flex-direction: column; justify-content: center;
      padding: 16px;
    }
    .timer-card {
      background: var(--bg); border-radius: var(--radius);
      border: 0.5px solid var(--border);
      padding: 24px 20px 20px; text-align: center; margin-bottom: 14px;
    }
    .session-name {
      font-size: 12px; color: var(--text2); margin-bottom: 12px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .phase-lbl {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 8px;
    }
    .phase-lbl.work { color: var(--red); }
    .phase-lbl.rest { color: var(--green); }
    .phase-lbl.warmup { color: var(--amber); }
    .phase-lbl.cooldown { color: var(--blue); }

    .time-display {
      font-size: 80px; font-weight: 300; line-height: 1;
      font-variant-numeric: tabular-nums; letter-spacing: -2px;
      color: var(--text); margin-bottom: 12px;
    }
    .prog-wrap { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin: 0 0 14px; }
    .prog-fill { height: 100%; border-radius: 3px; transition: width 0.6s linear; }
    .prog-fill.work { background: var(--red); }
    .prog-fill.rest { background: var(--green); }
    .prog-fill.warmup { background: var(--amber); }
    .prog-fill.cooldown { background: var(--blue); }

    .round-display { font-size: 15px; color: var(--text2); margin-bottom: 4px; }
    .next-display { font-size: 12px; color: var(--text3); }

    .timer-btns { display: flex; gap: 10px; margin-bottom: 10px; }
    .tbtn {
      flex: 1; padding: 15px; border-radius: var(--radius-sm);
      border: 0.5px solid var(--border2); background: var(--bg);
      color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .tbtn:active { opacity: 0.75; transform: scale(0.97); }
    .tbtn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .tbtn.danger { border-color: rgba(226,75,74,0.4); color: var(--red); }
    .tbtn.danger:hover { background: rgba(226,75,74,0.08); }

    /* Finished */
    .finished-card {
      background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border);
      padding: 32px 20px; text-align: center;
    }
    .finished-icon { font-size: 52px; margin-bottom: 12px; }
    .finished-title { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .finished-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

    /* Editor */
    .editor-card {
      background: var(--bg); border-radius: var(--radius);
      border: 0.5px solid var(--border); overflow: hidden; margin-bottom: 10px;
    }
    .form-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; gap: 8px;
    }
    .form-row + .form-row { border-top: 0.5px solid var(--border); }
    .form-lbl { font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .form-ctrl { display: flex; align-items: center; gap: 8px; }
    .num-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 0.5px solid var(--border2); background: var(--bg2);
      color: var(--text); font-size: 18px; cursor: pointer; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .num-btn:active { background: var(--bg3); }
    .num-val { font-size: 15px; font-weight: 600; min-width: 36px; text-align: center; }
    .name-input {
      width: 100%; font-size: 15px; padding: 12px 14px;
      background: var(--bg); color: var(--text); border: none; outline: none;
    }
    .total-hint {
      font-size: 12px; color: var(--text2); text-align: right;
      padding: 0 2px 10px;
    }
    .editor-btns { display: flex; gap: 10px; }
    .ebtn {
      flex: 1; padding: 14px; border-radius: var(--radius-sm);
      border: 0.5px solid var(--border2); background: var(--bg);
      color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .ebtn:active { opacity: 0.75; }
    .ebtn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* Back btn in topbar */
    .back-btn {
      display: none; align-items: center; gap: 6px;
      background: none; border: none; color: var(--blue);
      font-size: 16px; cursor: pointer; padding: 0; margin-bottom: 2px;
    }
    .back-btn.visible { display: flex; }

    .empty-state { text-align: center; padding: 24px 16px; color: var(--text2); font-size: 13px; }

    .install-hint {
      background: var(--info-bg); color: var(--info-text);
      border-radius: var(--radius-sm); padding: 12px 14px;
      font-size: 12px; line-height: 1.5; margin-bottom: 10px; display: none;
    }
  </style>
</head>
<body>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <button class="back-btn" id="back-btn">
      <i class="ti ti-chevron-left"></i> Kembali
    </button>
    <div class="topbar-title" id="topbar-title">Interval Timer</div>
    <div class="topbar-sub" id="topbar-sub">Pilih latihan untuk mulai</div>
  </div>

  <!-- SCREEN: DAFTAR -->
  <div class="screen active content" id="screen-list">

    <div class="install-hint" id="install-hint">
      📲 Untuk install: buka di Safari → ketuk <strong>⬆ Share</strong> → <strong>Add to Home Screen</strong>
    </div>

    <div class="section-label">Protokol dari coach & ilmuwan</div>
    <div class="card" id="coach-cards"></div>

    <div class="section-label">Latihan saya</div>
    <div id="custom-cards"></div>

  </div>

  <!-- SCREEN: TIMER -->
  <div class="screen" id="screen-timer">
    <div class="timer-wrapper">
      <div class="timer-card" id="timer-card">
        <div class="session-name" id="timer-session-name"></div>
        <div class="phase-lbl" id="phase-lbl">Bersiap</div>
        <div class="time-display" id="time-display">0:00</div>
        <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:100%"></div></div>
        <div class="round-display" id="round-display"></div>
        <div class="next-display" id="next-display"></div>
      </div>
      <div class="timer-btns">
        <button class="tbtn primary" id="btn-pp">
          <i class="ti ti-player-play" id="icon-pp"></i>
          <span id="lbl-pp">Mulai</span>
        </button>
        <button class="tbtn" id="btn-skip" title="Skip fase">
          <i class="ti ti-player-skip-forward"></i>
        </button>
        <button class="tbtn danger" id="btn-stop" title="Stop">
          <i class="ti ti-player-stop"></i>
        </button>
      </div>
      <div class="finished-card" id="finished-card" style="display:none">
        <div class="finished-icon">🎉</div>
        <div class="finished-title">Selesai!</div>
        <div class="finished-sub" id="finished-sub"></div>
        <button class="tbtn primary" onclick="goHome()" style="width:100%">
          <i class="ti ti-home"></i> Kembali ke daftar
        </button>
      </div>
    </div>
  </div>

  <!-- SCREEN: EDITOR -->
  <div class="screen content" id="screen-editor">
    <div class="editor-card">
      <input class="name-input" id="input-name" type="text" placeholder="Nama latihan, cth: Lari 30/30" />
    </div>

    <div class="section-label">Interval</div>
    <div class="editor-card">
      <div class="form-row">
        <span class="form-lbl"><i class="ti ti-flame" style="color:var(--amber)"></i> Pemanasan</span>
        <div class="form-ctrl">
          <button class="num-btn" onclick="adj('warmup',-30)">−</button>
          <span class="num-val" id="e-warmup">0:00</span>
          <button class="num-btn" onclick="adj('warmup',30)">+</button>
        </div>
      </div>
      <div class="form-row">
        <span class="form-lbl"><i class="ti ti-run" style="color:var(--red)"></i> Kerja keras</span>
        <div class="form-ctrl">
          <button class="num-btn" onclick="adj('work',-5)">−</button>
          <span class="num-val" id="e-work">0:30</span>
          <button class="num-btn" onclick="adj('work',5)">+</button>
        </div>
      </div>
      <div class="form-row">
        <span class="form-lbl"><i class="ti ti-walk" style="color:var(--green)"></i> Istirahat/Jalan</span>
        <div class="form-ctrl">
          <button class="num-btn" onclick="adj('rest',-5)">−</button>
          <span class="num-val" id="e-rest">0:30</span>
          <button class="num-btn" onclick="adj('rest',5)">+</button>
        </div>
      </div>
      <div class="form-row">
        <span class="form-lbl"><i class="ti ti-repeat"></i> Jumlah ronde</span>
        <div class="form-ctrl">
          <button class="num-btn" onclick="adj('rounds',-1)">−</button>
          <span class="num-val" id="e-rounds">8</span>
          <button class="num-btn" onclick="adj('rounds',1)">+</button>
        </div>
      </div>
      <div class="form-row">
        <span class="form-lbl"><i class="ti ti-snowflake" style="color:var(--blue)"></i> Pendinginan</span>
        <div class="form-ctrl">
          <button class="num-btn" onclick="adj('cooldown',-30)">−</button>
          <span class="num-val" id="e-cooldown">0:00</span>
          <button class="num-btn" onclick="adj('cooldown',30)">+</button>
        </div>
      </div>
    </div>

    <div class="total-hint" id="e-total">Total: 8:00</div>

    <div class="editor-btns">
      <button class="ebtn primary" id="btn-save"><i class="ti ti-device-floppy"></i> Simpan</button>
      <button class="ebtn" id="btn-run-editor"><i class="ti ti-player-play"></i> Mulai</button>
    </div>
  </div>

</div>

<!-- FAB -->
<button class="fab" id="fab" title="Buat latihan baru" onclick="openEditor(-1)">
  <i class="ti ti-plus"></i>
</button>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-list" onclick="goHome()">
    <i class="ti ti-list"></i> Latihan
  </button>
</div>

<script>
const STORAGE_KEY = 'iTimer_customV3';

const COACH_PRESETS = [
  {
    id:'tabata', name:'Tabata', coach:'Dr. Izumi Tabata · 1996', badge:'Ilmiah', badgeClass:'badge-science',
    icon:'⚡', iconBg:'#eaf3de',
    info:'20 detik all-out + 10 detik istirahat, 8 ronde. Terbukti tingkatkan VO2 max +14% dan kapasitas anaerobik +28% dalam 6 minggu.',
    warmup:300, work:20, rest:10, rounds:8, cooldown:120
  },
  {
    id:'norwegian4x4', name:'Norwegian 4×4', coach:'Helgerud & Wisløff · NTNU Norway', badge:'Ilmiah', badgeClass:'badge-science',
    icon:'🏔️', iconBg:'#e6f1fb',
    info:'4 menit kerja di 90–95% detak jantung max + 3 menit jalan santai, 4 ronde. Paling banyak diteliti untuk meningkatkan VO2 max.',
    warmup:600, work:240, rest:180, rounds:4, cooldown:600
  },
  {
    id:'galloway1', name:'Galloway Run/Walk — Pemula', coach:'Jeff Galloway · Olimpian USA', badge:'Coach', badgeClass:'badge-coach',
    icon:'🚶', iconBg:'#faeeda',
    info:'Lari 1 menit, jalan 1 menit. Metode Run-Walk-Run telah membantu 350.000+ pelari menyelesaikan maraton tanpa cedera.',
    warmup:300, work:60, rest:60, rounds:15, cooldown:300
  },
  {
    id:'galloway30', name:'Galloway 30/30', coach:'Jeff Galloway · Olimpian USA', badge:'Coach', badgeClass:'badge-coach',
    icon:'🏃', iconBg:'#faeeda',
    info:'Lari 30 detik, jalan 30 detik. Galloway merekomendasikan rasio ini untuk berlari lebih cepat dengan usaha lebih sedikit.',
    warmup:300, work:30, rest:30, rounds:20, cooldown:300
  },
  {
    id:'thirty30', name:'Interval 30/30 VO2 Max', coach:'Populer di kalangan coach elite', badge:'Populer', badgeClass:'badge-popular',
    icon:'💪', iconBg:'#faece7',
    info:'30 detik cepat, 30 detik santai. Disukai coach karena mencegah penumpukan laktat sambil menjaga permintaan oksigen tetap tinggi.',
    warmup:300, work:30, rest:30, rounds:20, cooldown:120
  },
  {
    id:'jackdaniels', name:'VO2 Max · Jack Daniels', coach:'Jack Daniels · Coach Jarak Jauh', badge:'Coach', badgeClass:'badge-coach',
    icon:'🎯', iconBg:'#e6f1fb',
    info:'5 menit di kecepatan VO2 max (pace 5K) + 2,5 menit jog ringan, 5 ronde. Coach legendaris untuk pengembangan atlet jarak jauh.',
    warmup:600, work:300, rest:150, rounds:5, cooldown:600
  },
];

let customPresets = [];
let editIdx = -1;
let editVals = { name:'', warmup:0, work:30, rest:30, rounds:8, cooldown:0 };
let timerState = null;
let timerInterval = null;
let audioCtx = null;
let openInfoId = null;

function loadCustom() {
  try { customPresets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { customPresets = []; }
}
function saveCustom() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(customPresets)); } catch(e) {}
}

function fmtSec(s) {
  if (s <= 0) return '0:00';
  const m = Math.floor(s/60), sec = s%60;
  return m + ':' + String(sec).padStart(2,'0');
}
function calcTotal(p) {
  return p.warmup + p.work*p.rounds + p.rest*(p.rounds-1) + p.cooldown;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
}

function setTopbar(title, sub, showBack) {
  document.getElementById('topbar-title').textContent = title;
  document.getElementById('topbar-sub').textContent = sub || '';
  const bb = document.getElementById('back-btn');
  bb.className = showBack ? 'back-btn visible' : 'back-btn';
}

function goHome() {
  if (timerState && timerState.running) {
    timerState.running = false; clearInterval(timerInterval); timerInterval = null;
  }
  timerState = null;
  document.getElementById('fab').style.display = 'flex';
  showScreen('list');
  renderList();
  setTopbar('Interval Timer', 'Pilih latihan untuk mulai', false);
}

// Detect iOS Safari for install hint
function isIosSafari() {
  const ua = navigator.userAgent;
  return /iP(ad|hone|od)/.test(ua) && /WebKit/.test(ua) && !/(CriOS|FxiOS|OPiOS|mercury)/.test(ua);
}
function isStandalone() {
  return window.navigator.standalone === true;
}

function renderList() {
  if (isIosSafari() && !isStandalone()) {
    document.getElementById('install-hint').style.display = 'block';
  }

  const coachDiv = document.getElementById('coach-cards');
  coachDiv.innerHTML = COACH_PRESETS.map((p, i) => `
    <div class="preset-row" onclick="toggleInfo('coach',${i})">
      <div class="preset-icon" style="background:${p.iconBg}">${p.icon}</div>
      <div class="preset-body">
        <span class="badge ${p.badgeClass}">${esc(p.badge)}</span>
        <div class="preset-name">${esc(p.name)}</div>
        <div class="preset-coach">${esc(p.coach)}</div>
        <div class="preset-meta">${p.rounds} ronde · ${fmtSec(p.work)} kerja / ${fmtSec(p.rest)} istirahat · ${fmtSec(calcTotal(p))}</div>
      </div>
      <i class="ti ti-chevron-right preset-chevron" id="chev-coach-${i}"></i>
    </div>
    <div class="info-panel" id="info-coach-${i}">
      <i class="ti ti-info-circle" style="flex-shrink:0;margin-top:1px;color:var(--text3)"></i>
      <div>${esc(p.info)}</div>
    </div>
    <div class="action-row" id="act-coach-${i}">
      <button class="action-btn go" onclick="event.stopPropagation();runPreset('coach',${i})">
        <i class="ti ti-player-play"></i> Mulai
      </button>
    </div>
  `).join('');

  const customDiv = document.getElementById('custom-cards');
  if (customPresets.length === 0) {
    customDiv.innerHTML = '<div class="empty-state"><i class="ti ti-plus-circle" style="font-size:32px;display:block;margin:0 auto 8px"></i>Belum ada latihan.<br>Ketuk + untuk membuat.</div>';
  } else {
    customDiv.innerHTML = '<div class="card">' + customPresets.map((p, i) => `
      <div class="preset-row" onclick="toggleInfo('custom',${i})">
        <div class="preset-icon" style="background:var(--bg3)">🏅</div>
        <div class="preset-body">
          <div class="preset-name">${esc(p.name)}</div>
          <div class="preset-meta">${p.rounds} ronde · ${fmtSec(p.work)} kerja / ${fmtSec(p.rest)} istirahat · ${fmtSec(calcTotal(p))}</div>
        </div>
        <i class="ti ti-chevron-right preset-chevron" id="chev-custom-${i}"></i>
      </div>
      <div class="info-panel" id="info-custom-${i}"></div>
      <div class="action-row" id="act-custom-${i}">
        <button class="action-btn go" onclick="event.stopPropagation();runPreset('custom',${i})">
          <i class="ti ti-player-play"></i> Mulai
        </button>
        <button class="action-btn" onclick="event.stopPropagation();editPreset(${i})">
          <i class="ti ti-edit"></i> Edit
        </button>
        <button class="action-btn" onclick="event.stopPropagation();deletePreset(${i})" style="color:var(--red)">
          <i class="ti ti-trash"></i> Hapus
        </button>
      </div>
    `).join('') + '</div>';
  }
}

function toggleInfo(type, i) {
  const key = type+'-'+i;
  const infoEl = document.getElementById('info-'+key);
  const actEl = document.getElementById('act-'+key);
  const chevEl = document.getElementById('chev-'+key);
  const isOpen = infoEl && infoEl.classList.contains('open');

  document.querySelectorAll('.info-panel').forEach(e => e.classList.remove('open'));
  document.querySelectorAll('.action-row').forEach(e => e.classList.remove('open'));
  document.querySelectorAll('.preset-chevron').forEach(e => { e.style.transform=''; e.style.color=''; });

  if (!isOpen) {
    if (infoEl) infoEl.classList.add('open');
    if (actEl) actEl.classList.add('open');
    if (chevEl) { chevEl.style.transform = 'rotate(90deg)'; chevEl.style.color = 'var(--text)'; }
  }
}

function runPreset(type, i) {
  const p = type === 'coach' ? COACH_PRESETS[i] : customPresets[i];
  startTimer(p);
}
function editPreset(i) { openEditor(i); }
function deletePreset(i) {
  if (confirm('Hapus "' + customPresets[i].name + '"?')) {
    customPresets.splice(i,1); saveCustom(); renderList();
  }
}

// TIMER
function buildPhases(p) {
  const phases = [];
  if (p.warmup > 0) phases.push({ label:'Pemanasan', type:'warmup', dur:p.warmup });
  for (let r = 0; r < p.rounds; r++) {
    phases.push({ label:'Kerja keras', type:'work', dur:p.work, round:r+1, rounds:p.rounds });
    if (r < p.rounds-1) phases.push({ label:'Istirahat', type:'rest', dur:p.rest, round:r+1, rounds:p.rounds });
  }
  if (p.cooldown > 0) phases.push({ label:'Pendinginan', type:'cooldown', dur:p.cooldown });
  return phases;
}

function startTimer(preset) {
  const phases = buildPhases(preset);
  if (!phases.length) return;
  timerState = { preset, phases, phaseIdx:0, remaining:phases[0].dur, running:false };
  document.getElementById('timer-session-name').textContent = preset.name + (preset.coach ? ' · ' + preset.coach : '');
  document.getElementById('timer-card').style.display = '';
  document.querySelectorAll('.timer-btns').forEach(e=>e.style.display='');
  document.getElementById('finished-card').style.display = 'none';
  document.getElementById('fab').style.display = 'none';
  setTopbar(preset.name, preset.coach || '', true);
  document.getElementById('back-btn').onclick = () => goHome();
  showScreen('timer');
  renderTimer();

  // Keep screen on (if supported)
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(()=>{});
  }
}

function renderTimer() {
  if (!timerState) return;
  const ph = timerState.phases[timerState.phaseIdx];
  const lbl = document.getElementById('phase-lbl');
  lbl.textContent = ph.label;
  lbl.className = 'phase-lbl ' + ph.type;
  document.getElementById('time-display').textContent = fmtSec(timerState.remaining);
  const pct = ph.dur > 0 ? (timerState.remaining/ph.dur)*100 : 0;
  const bar = document.getElementById('prog-fill');
  bar.style.width = pct + '%';
  bar.className = 'prog-fill ' + ph.type;
  document.getElementById('round-display').textContent = ph.round ? 'Ronde '+ph.round+' / '+ph.rounds : ph.label;
  const next = timerState.phases[timerState.phaseIdx+1];
  document.getElementById('next-display').textContent = next ? 'Berikutnya: '+next.label : 'Fase terakhir';
  const pp = document.getElementById('icon-pp');
  const lp = document.getElementById('lbl-pp');
  if (timerState.running) { pp.className='ti ti-player-pause'; lp.textContent='Jeda'; }
  else { pp.className='ti ti-player-play'; lp.textContent = (timerState.phaseIdx===0 && timerState.remaining===timerState.phases[0].dur) ? 'Mulai' : 'Lanjut'; }
}

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function vibrate(pattern) {
  try {
    if (navigator.vibrate) navigator.vibrate(pattern);
  } catch(e) {}
}

function beep(type) {
  try {
    initAudio();
    const freqs = { work:900, rest:440, warmup:660, cooldown:330, countdown:700, finish:1046 };
    const freq = freqs[type] || 600;
    const dur = type === 'finish' ? 0.8 : 0.2;

    const playTone = (f, d, delay) => {
      const when = audioCtx.currentTime + (delay || 0);
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.frequency.value = f;
      g.gain.setValueAtTime(0.3, when);
      g.gain.exponentialRampToValueAtTime(0.001, when + d);
      osc.start(when);
      osc.stop(when + d);
    };

    playTone(freq, dur);

    if (type === 'finish') {
      playTone(1318, 0.6, 0.35);
      vibrate([100, 80, 100, 80, 200]);
    } else if (type === 'work') {
      vibrate([80, 0, 80]);
    } else if (type === 'rest') {
      vibrate([200]);
    } else if (type === 'countdown') {
      vibrate([30]);
    } else if (type === 'warmup' || type === 'cooldown') {
      vibrate([100]);
    }
  } catch(e) {}
}

function tickTimer() {
  if (!timerState || !timerState.running) return;
  timerState.remaining--;
  if (timerState.remaining<=3 && timerState.remaining>0) beep('countdown');
  if (timerState.remaining<=0) {
    const next = timerState.phaseIdx+1;
    if (next < timerState.phases.length) {
      timerState.phaseIdx = next;
      timerState.remaining = timerState.phases[next].dur;
      beep(timerState.phases[next].type);
    } else {
      timerState.running = false; clearInterval(timerInterval); timerInterval = null;
      beep('finish'); showFinished(); return;
    }
  }
  renderTimer();
}

function showFinished() {
  document.getElementById('timer-card').style.display = 'none';
  document.querySelectorAll('.timer-btns').forEach(e=>e.style.display='none');
  document.getElementById('finished-card').style.display = 'block';
  const total = timerState.phases.reduce((s,p)=>s+p.dur,0);
  document.getElementById('finished-sub').textContent = timerState.preset.name + ' · ' + fmtSec(total);
}

document.getElementById('btn-pp').onclick = () => {
  if (!timerState) return;
  initAudio();
  timerState.running = !timerState.running;
  if (timerState.running) { timerInterval = setInterval(tickTimer,1000); beep('work'); }
  else { clearInterval(timerInterval); timerInterval = null; }
  renderTimer();
};
document.getElementById('btn-skip').onclick = () => {
  if (!timerState) return;
  const next = timerState.phaseIdx+1;
  if (next < timerState.phases.length) {
    timerState.phaseIdx=next; timerState.remaining=timerState.phases[next].dur;
    beep(timerState.phases[next].type); renderTimer();
  } else { timerState.running=false; clearInterval(timerInterval); timerInterval=null; beep('finish'); showFinished(); }
};
document.getElementById('btn-stop').onclick = () => goHome();

// EDITOR
function openEditor(idx) {
  editIdx = idx;
  editVals = idx===-1
    ? {name:'',warmup:0,work:30,rest:30,rounds:8,cooldown:0}
    : Object.assign({}, customPresets[idx]);
  document.getElementById('input-name').value = editVals.name;
  document.getElementById('fab').style.display = 'none';
  refreshEditor();
  showScreen('editor');
  setTopbar(idx===-1 ? 'Latihan baru' : 'Edit latihan', '', true);
  document.getElementById('back-btn').onclick = () => {
    document.getElementById('fab').style.display='flex'; goHome();
  };
}

function adj(key, delta) {
  if (key==='rounds') editVals.rounds = Math.max(1, editVals.rounds+delta);
  else editVals[key] = Math.max(0, editVals[key]+delta);
  refreshEditor();
}

function refreshEditor() {
  document.getElementById('e-warmup').textContent = fmtSec(editVals.warmup);
  document.getElementById('e-work').textContent = fmtSec(editVals.work);
  document.getElementById('e-rest').textContent = fmtSec(editVals.rest);
  document.getElementById('e-rounds').textContent = editVals.rounds;
  document.getElementById('e-cooldown').textContent = fmtSec(editVals.cooldown);
  document.getElementById('e-total').textContent = 'Total: ' + fmtSec(calcTotal(editVals));
}

document.getElementById('input-name').oninput = e => { editVals.name = e.target.value; };

document.getElementById('btn-save').onclick = () => {
  if (!editVals.name.trim()) { alert('Masukkan nama latihan dulu.'); return; }
  editVals.name = editVals.name.trim();
  if (editIdx===-1) customPresets.push(Object.assign({},editVals));
  else customPresets[editIdx] = Object.assign({},editVals);
  saveCustom();
  document.getElementById('fab').style.display='flex';
  goHome();
};

document.getElementById('btn-run-editor').onclick = () => {
  const p = Object.assign({},editVals);
  p.name = p.name||'Latihan saya';
  startTimer(p);
};

// iOS Audio unlock — tampilkan splash hanya sekali
function showAudioSplash() {
  const seen = localStorage.getItem('iTimer_audioUnlocked');
  if (seen) { loadCustom(); renderList(); return; }

  const splash = document.createElement('div');
  splash.id = 'audio-splash';
  splash.style.cssText = 'position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;gap:16px;';
  splash.innerHTML = `
    <div style="font-size:48px;line-height:1">🔔</div>
    <div style="font-size:18px;font-weight:600;color:var(--text)">Aktifkan suara &amp; getaran</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.6;max-width:280px">
      iPhone membutuhkan konfirmasi untuk mengaktifkan suara.<br><br>
      Pastikan <strong>tombol silent</strong> di samping iPhone tidak dalam posisi merah.
    </div>
    <button id="btn-unlock" style="margin-top:8px;padding:16px 40px;border-radius:12px;background:var(--text);color:var(--bg);border:none;font-size:16px;font-weight:600;cursor:pointer;width:100%;max-width:280px;">Ketuk untuk mulai</button>
    <div style="font-size:11px;color:var(--text3);margin-top:4px">Ini hanya muncul sekali</div>
  `;
  document.body.appendChild(splash);

  document.getElementById('btn-unlock').onclick = () => {
    initAudio();
    beep('work');
    setTimeout(() => beep('rest'), 350);
    localStorage.setItem('iTimer_audioUnlocked', '1');
    splash.style.opacity = '0';
    splash.style.transition = 'opacity 0.3s';
    setTimeout(() => { splash.remove(); loadCustom(); renderList(); }, 320);
  };
}

showAudioSplash();
</script>
